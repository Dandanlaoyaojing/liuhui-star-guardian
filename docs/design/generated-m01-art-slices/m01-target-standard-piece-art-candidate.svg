     stroke="#2b2924" stroke-width="1.6" stroke-linejoin="round">
    <use href="#std-circle" transform="scale(0.42)" />
    <use href="#std-triangle" transform="translate(74 0) scale(0.42)" />
    <use href="#std-hexagon" transform="translate(148 0) scale(0.42)" />
    <line x1="-54" y1="30" x2="210" y2="30" stroke="#2b2924" stroke-width="1" stroke-dasharray="5 9" />
