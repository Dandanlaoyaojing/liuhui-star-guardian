    <polygon points="344,162 368,120.431 416,120.431 440,162 416,203.569 368,203.569" fill="url(#muted-green-wash)" clip-path="url(#clip-right-triangle)" />
    <polygon points="376,226 400,184.431 448,184.431 472,226 448,267.569 400,267.569" fill="url(#muted-orange-wash)" clip-path="url(#clip-top-hexagon)" />
    <circle cx="364" cy="260" r="48" fill="url(#muted-purple-wash)" clip-path="url(#clip-lower-hexagon)" />
  </g>

  <g id="ink-linework-overlays"
     fill="none" stroke="#171512" stroke-opacity="0.9"
     stroke-width="1.45" stroke-linejoin="round">
    <use href="#std-circle" transform="translate(196 154)" />
    <use href="#std-triangle" transform="translate(252 158)" />
    <use href="#std-triangle" transform="translate(350 158)" />
    <use href="#std-hexagon" transform="translate(392 162)" />
    <use href="#std-hexagon" transform="translate(424 226)" />
    <use href="#std-circle" transform="translate(364 260)" />
  </g>

  <g id="dry-brush-detail" fill="none" stroke="#514a3b" stroke-opacity="0.18" stroke-width="1" stroke-linecap="round">
    <path d="M158 141 C174 137, 188 138, 205 142" />
    <path d="M223 169 C240 176, 258 177, 276 172" />
    <path d="M318 147 C338 140, 360 141, 378 149" />
    <path d="M398 212 C414 208, 434 209, 452 215" />
    <path d="M333 271 C350 278, 373 277, 390 270" />
  </g>

  <g id="bottom-standard-piece-check" transform="translate(126 376)"
