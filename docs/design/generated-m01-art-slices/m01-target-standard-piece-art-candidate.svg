    <use href="#std-triangle" transform="translate(325 171) scale(0.78)" />
    <use href="#std-hexagon" transform="translate(374 190) scale(0.78)" />
    <use href="#std-circle" transform="translate(434 175) scale(0.78)" />
    <use href="#std-triangle" transform="translate(395 239) scale(0.78)" />
    <use href="#std-hexagon" transform="translate(345 274) scale(0.78)" />
  </g>

  <g id="true-overlap-colors"
