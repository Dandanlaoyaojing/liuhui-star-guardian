<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420">
  <defs>
    <circle id="std-circle" cx="0" cy="0" r="48" />
    <polygon id="std-triangle" points="0,-41.569 -48,41.569 48,41.569" />
    <polygon id="std-hexagon" points="-48,0 -24,-41.569 24,-41.569 48,0 24,41.569 -24,41.569" />

    <clipPath id="clip-left-circle" clipPathUnits="userSpaceOnUse">
      <circle cx="196" cy="154" r="48" />
    </clipPath>
    <clipPath id="clip-right-triangle" clipPathUnits="userSpaceOnUse">
      <polygon points="350,116.431 302,199.569 398,199.569" />
    </clipPath>
    <clipPath id="clip-top-hexagon" clipPathUnits="userSpaceOnUse">
      <polygon points="344,162 368,120.431 416,120.431 440,162 416,203.569 368,203.569" />
    </clipPath>
    <clipPath id="clip-lower-hexagon" clipPathUnits="userSpaceOnUse">
      <polygon points="376,226 400,184.431 448,184.431 472,226 448,267.569 400,267.569" />
    </clipPath>

    <pattern id="paper-tooth" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="#f4eedf" />
      <path d="M2 6 L9 5 M18 9 L28 8 M5 21 L14 23 M22 26 L31 25"
        fill="none" stroke="#8f8269" stroke-width="0.55" stroke-opacity="0.18" />
      <circle cx="7" cy="14" r="0.9" fill="#b7a884" fill-opacity="0.16" />
      <circle cx="24" cy="17" r="0.75" fill="#6f6552" fill-opacity="0.12" />
      <circle cx="16" cy="29" r="0.7" fill="#d6c69d" fill-opacity="0.22" />
    </pattern>

    <linearGradient id="piece-paper-wash" x1="0" y1="82" x2="0" y2="274" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d7d1b9" stop-opacity="0.72" />
      <stop offset="0.52" stop-color="#bfc0ac" stop-opacity="0.56" />
      <stop offset="1" stop-color="#e2d8bd" stop-opacity="0.62" />
    </linearGradient>
    <radialGradient id="muted-purple-wash" cx="244" cy="164" r="92" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9a78ad" stop-opacity="0.9" />
      <stop offset="1" stop-color="#7f5d95" stop-opacity="0.78" />
    </radialGradient>
    <radialGradient id="muted-green-wash" cx="386" cy="162" r="92" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#86aa7d" stop-opacity="0.9" />
      <stop offset="1" stop-color="#668c65" stop-opacity="0.78" />
    </radialGradient>
    <radialGradient id="muted-orange-wash" cx="396" cy="224" r="90" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#cc8b47" stop-opacity="0.9" />
      <stop offset="1" stop-color="#ad6f34" stop-opacity="0.78" />
    </radialGradient>
  </defs>

  <rect width="720" height="420" fill="url(#paper-tooth)" />
  <rect x="70" y="36" width="580" height="324" rx="15" fill="#eee4c7" stroke="#25221d" stroke-width="2.6" />
  <rect x="84" y="50" width="552" height="296" rx="10" fill="#f6ecd4" stroke="#7f7158" stroke-width="1.5" />

  <g id="target-frame" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M104 74 C190 62, 303 59, 430 66 C509 70, 579 68, 616 78"
      stroke="#9a8d70" stroke-width="1.2" stroke-opacity="0.36" />
    <path d="M102 328 C209 342, 335 338, 454 330 C525 325, 585 327, 616 316"
      stroke="#7f7158" stroke-width="1.1" stroke-opacity="0.32" />
    <circle cx="104" cy="70" r="3.5" fill="#9b8c67" stroke="#25221d" stroke-width="1" />
    <circle cx="616" cy="70" r="3.5" fill="#9b8c67" stroke="#25221d" stroke-width="1" />
    <circle cx="104" cy="330" r="3.5" fill="#9b8c67" stroke="#25221d" stroke-width="1" />
    <circle cx="616" cy="330" r="3.5" fill="#9b8c67" stroke="#25221d" stroke-width="1" />
  </g>

  <g id="standard-pieces"
