    <use href="#std-triangle" transform="translate(252 158) scale(0.78)" />
    <use href="#std-triangle" transform="translate(350 158) scale(0.78)" />
    <use href="#std-hexagon" transform="translate(392 162) scale(0.78)" />
    <use href="#std-hexagon" transform="translate(424 226) scale(0.78)" />
    <use href="#std-circle" transform="translate(364 260) scale(0.78)" />
  </g>

  <g id="true-overlap-colors"
