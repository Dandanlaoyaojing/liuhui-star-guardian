<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420">
  <defs>
    <circle id="std-circle" cx="0" cy="0" r="48" />
    <polygon id="std-triangle" points="0,-41.569 -48,41.569 48,41.569" />
    <polygon id="std-hexagon" points="-48,0 -24,-41.569 24,-41.569 48,0 24,41.569 -24,41.569" />

    <clipPath id="clip-left-circle" clipPathUnits="userSpaceOnUse">
      <circle cx="170" cy="160" r="48" />
    </clipPath>
    <clipPath id="clip-first-triangle" clipPathUnits="userSpaceOnUse">
      <polygon points="225,118.431 177,201.569 273,201.569" />
    </clipPath>
    <clipPath id="clip-middle-hexagon" clipPathUnits="userSpaceOnUse">
      <polygon points="232,148 256,106.431 304,106.431 328,148 304,189.569 256,189.569" />
    </clipPath>
    <clipPath id="clip-middle-circle" clipPathUnits="userSpaceOnUse">
      <circle cx="340" cy="184" r="48" />
    </clipPath>
    <clipPath id="clip-right-triangle" clipPathUnits="userSpaceOnUse">
      <polygon points="398,152.431 350,235.569 446,235.569" />
    </clipPath>

    <pattern id="paper-tooth" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="#f4eedf" />
      <path d="M2 6 L9 5 M18 9 L28 8 M5 21 L14 23 M22 26 L31 25"
        fill="none" stroke="#8f8269" stroke-width="0.55" stroke-opacity="0.18" />
      <circle cx="7" cy="14" r="0.9" fill="#b7a884" fill-opacity="0.16" />
      <circle cx="24" cy="17" r="0.75" fill="#6f6552" fill-opacity="0.12" />
      <circle cx="16" cy="29" r="0.7" fill="#d6c69d" fill-opacity="0.22" />
    </pattern>

    <linearGradient id="piece-paper-wash" x1="0" y1="82" x2="0" y2="274" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d7d1b9" stop-opacity="0.72" />
      <stop offset="0.52" stop-color="#bfc0ac" stop-opacity="0.56" />
      <stop offset="1" stop-color="#e2d8bd" stop-opacity="0.62" />
    </linearGradient>
    <radialGradient id="muted-purple-wash" cx="260" cy="176" r="132" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9a78ad" stop-opacity="0.9" />
      <stop offset="1" stop-color="#7f5d95" stop-opacity="0.78" />
    </radialGradient>
    <radialGradient id="muted-green-wash" cx="358" cy="170" r="144" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#86aa7d" stop-opacity="0.9" />
      <stop offset="1" stop-color="#668c65" stop-opacity="0.78" />
    </radialGradient>
    <radialGradient id="muted-orange-wash" cx="322" cy="176" r="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#cc8b47" stop-opacity="0.9" />
      <stop offset="1" stop-color="#ad6f34" stop-opacity="0.78" />
    </radialGradient>
  </defs>

  <rect width="720" height="420" fill="url(#paper-tooth)" />
  <rect x="70" y="36" width="580" height="324" rx="15" fill="#eee4c7" stroke="#25221d" stroke-width="2.6" />
  <rect x="84" y="50" width="552" height="296" rx="10" fill="#f6ecd4" stroke="#7f7158" stroke-width="1.5" />

  <g id="target-frame" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M104 74 C190 62, 303 59, 430 66 C509 70, 579 68, 616 78"
      stroke="#9a8d70" stroke-width="1.2" stroke-opacity="0.36" />
    <path d="M102 328 C209 342, 335 338, 454 330 C525 325, 585 327, 616 316"
      stroke="#7f7158" stroke-width="1.1" stroke-opacity="0.32" />
    <circle cx="104" cy="70" r="3.5" fill="#9b8c67" stroke="#25221d" stroke-width="1" />
    <circle cx="616" cy="70" r="3.5" fill="#9b8c67" stroke="#25221d" stroke-width="1" />
    <circle cx="104" cy="330" r="3.5" fill="#9b8c67" stroke="#25221d" stroke-width="1" />
    <circle cx="616" cy="330" r="3.5" fill="#9b8c67" stroke="#25221d" stroke-width="1" />
  </g>

  <g id="standard-pieces"
     fill="url(#piece-paper-wash)"
     fill-opacity="0.78"
     stroke="#2b2924" stroke-width="2.2" stroke-linejoin="round">
    <use href="#std-circle" transform="translate(170 160)" />
    <use href="#std-triangle" transform="translate(225 160)" />
    <use href="#std-hexagon" transform="translate(280 148)" />
    <use href="#std-circle" transform="translate(340 184)" />
    <use href="#std-triangle" transform="translate(398 194)" />
    <use href="#std-hexagon" transform="translate(456 202)" />
  </g>

  <g id="piece-wash-overlays" fill="#fff5d9" fill-opacity="0.18" stroke="none">
    <use href="#std-circle" transform="translate(170 160) scale(0.78)" />
    <use href="#std-triangle" transform="translate(225 160) scale(0.78)" />
    <use href="#std-hexagon" transform="translate(280 148) scale(0.78)" />
    <use href="#std-circle" transform="translate(340 184) scale(0.78)" />
    <use href="#std-triangle" transform="translate(398 194) scale(0.78)" />
    <use href="#std-hexagon" transform="translate(456 202) scale(0.78)" />
  </g>

  <g id="true-overlap-colors"
     fill-opacity="0.9" stroke="#2b2924" stroke-opacity="0.58"
     stroke-width="1.25" stroke-linejoin="round">
    <polygon points="225,118.431 177,201.569 273,201.569" fill="url(#muted-purple-wash)" clip-path="url(#clip-left-circle)" />
    <polygon points="232,148 256,106.431 304,106.431 328,148 304,189.569 256,189.569" fill="url(#muted-green-wash)" clip-path="url(#clip-first-triangle)" />
    <circle cx="340" cy="184" r="48" fill="url(#muted-orange-wash)" clip-path="url(#clip-middle-hexagon)" />
    <polygon points="398,152.431 350,235.569 446,235.569" fill="url(#muted-purple-wash)" clip-path="url(#clip-middle-circle)" />
    <polygon points="408,202 432,160.431 480,160.431 504,202 480,243.569 432,243.569" fill="url(#muted-green-wash)" clip-path="url(#clip-right-triangle)" />
  </g>

  <g id="ink-linework-overlays"
     fill="none" stroke="#171512" stroke-opacity="0.9"
     stroke-width="1.45" stroke-linejoin="round">
    <use href="#std-circle" transform="translate(170 160)" />
    <use href="#std-triangle" transform="translate(225 160)" />
    <use href="#std-hexagon" transform="translate(280 148)" />
    <use href="#std-circle" transform="translate(340 184)" />
    <use href="#std-triangle" transform="translate(398 194)" />
    <use href="#std-hexagon" transform="translate(456 202)" />
  </g>

  <g id="dry-brush-detail" fill="none" stroke="#514a3b" stroke-opacity="0.18" stroke-width="1" stroke-linecap="round">
    <path d="M132 148 C148 144, 163 145, 181 150" />
    <path d="M198 170 C215 177, 235 178, 253 173" />
    <path d="M250 138 C270 131, 294 132, 314 141" />
    <path d="M310 195 C327 202, 350 203, 369 198" />
    <path d="M372 207 C390 214, 414 214, 433 208" />
    <path d="M430 192 C448 187, 470 189, 488 196" />
  </g>

  <g id="bottom-standard-piece-check" transform="translate(126 376)"
     fill="#c9c6b2" fill-opacity="0.5"
     stroke="#2b2924" stroke-width="1.6" stroke-linejoin="round">
    <use href="#std-circle" transform="scale(0.42)" />
    <use href="#std-triangle" transform="translate(74 0) scale(0.42)" />
    <use href="#std-hexagon" transform="translate(148 0) scale(0.42)" />
    <line x1="-54" y1="30" x2="210" y2="30" stroke="#2b2924" stroke-width="1" stroke-dasharray="5 9" />
  </g>
</svg>
