<svg xmlns="http://www.w3.org/2000/svg" width="560" height="360" viewBox="0 0 560 360">
  <defs>
    <!-- Runtime-standard token geometry: same circle, equilateral triangle, and regular hexagon templates as runtime. -->
    <circle id="std-circle" cx="0" cy="0" r="48" />
    <polygon id="std-triangle" points="0,-41.569 -48,41.569 48,41.569" />
    <polygon id="std-hexagon" points="-48,0 -24,-41.569 24,-41.569 48,0 24,41.569 -24,41.569" />

    <clipPath id="clip-left-circle" clipPathUnits="userSpaceOnUse">
      <circle cx="150" cy="160" r="48" />
    </clipPath>
    <clipPath id="clip-first-triangle" clipPathUnits="userSpaceOnUse">
      <polygon points="205,118.431 157,201.569 253,201.569" />
    </clipPath>
    <clipPath id="clip-middle-hexagon" clipPathUnits="userSpaceOnUse">
      <polygon points="212,148 236,106.431 284,106.431 308,148 284,189.569 236,189.569" />
    </clipPath>
    <clipPath id="clip-middle-circle" clipPathUnits="userSpaceOnUse">
      <circle cx="320" cy="184" r="48" />
    </clipPath>
    <clipPath id="clip-right-triangle" clipPathUnits="userSpaceOnUse">
      <polygon points="378,152.431 330,235.569 426,235.569" />
    </clipPath>
  </defs>

  <rect width="560" height="360" fill="#101820" />
  <rect x="72" y="42" width="416" height="276" rx="16" fill="#1b2227" stroke="#8a7046" stroke-width="6" />
  <rect x="86" y="56" width="388" height="248" rx="10" fill="#263036" stroke="#322a21" stroke-width="2" />

  <g id="standard-piece-instances" fill="#b7bab8" fill-opacity="0.45" stroke="#e2d8bd" stroke-opacity="0.8" stroke-width="4" stroke-linejoin="round">
    <use href="#std-circle" transform="translate(150 160)" />
    <use href="#std-triangle" transform="translate(205 160)" />
    <use href="#std-hexagon" transform="translate(260 148)" />
    <use href="#std-circle" transform="translate(320 184)" />
    <use href="#std-triangle" transform="translate(378 194)" />
    <use href="#std-hexagon" transform="translate(436 202)" />
  </g>

  <g id="boolean-overlap-colors" fill-opacity="1" stroke="#f2ead7" stroke-opacity="0.68" stroke-width="2" stroke-linejoin="round">
    <polygon points="205,118.431 157,201.569 253,201.569" fill="#8b62b5" clip-path="url(#clip-left-circle)" />
    <polygon points="212,148 236,106.431 284,106.431 308,148 284,189.569 236,189.569" fill="#5a9a67" clip-path="url(#clip-first-triangle)" />
    <circle cx="320" cy="184" r="48" fill="#bf7c34" clip-path="url(#clip-middle-hexagon)" />
    <polygon points="378,152.431 330,235.569 426,235.569" fill="#8b62b5" clip-path="url(#clip-middle-circle)" />
    <polygon points="388,202 412,160.431 460,160.431 484,202 460,243.569 412,243.569" fill="#5a9a67" clip-path="url(#clip-right-triangle)" />
  </g>

  <g id="piece-outline-restatement" fill="none" stroke="#1a1510" stroke-opacity="0.9" stroke-width="1.5" stroke-linejoin="round">
    <use href="#std-circle" transform="translate(150 160)" />
    <use href="#std-triangle" transform="translate(205 160)" />
    <use href="#std-hexagon" transform="translate(260 148)" />
    <use href="#std-circle" transform="translate(320 184)" />
    <use href="#std-triangle" transform="translate(378 194)" />
    <use href="#std-hexagon" transform="translate(436 202)" />
  </g>
</svg>
