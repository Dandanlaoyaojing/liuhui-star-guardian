<svg xmlns="http://www.w3.org/2000/svg" width="560" height="360" viewBox="0 0 560 360">
  <defs>
    <!-- Runtime-standard token geometry: same circle, equilateral triangle, and regular hexagon templates as runtime. -->
    <circle id="std-circle" cx="0" cy="0" r="48" />
    <polygon id="std-triangle" points="0,-41.569 -48,41.569 48,41.569" />
    <polygon id="std-hexagon" points="-48,0 -24,-41.569 24,-41.569 48,0 24,41.569 -24,41.569" />

    <clipPath id="clip-left-circle" clipPathUnits="userSpaceOnUse">
      <circle cx="203" cy="237" r="48" />
    </clipPath>
    <clipPath id="clip-first-triangle" clipPathUnits="userSpaceOnUse">
      <polygon points="245,129.431 197,212.569 293,212.569" />
    </clipPath>
    <clipPath id="clip-center-hexagon" clipPathUnits="userSpaceOnUse">
      <polygon points="246,190 270,148.431 318,148.431 342,190 318,231.569 270,231.569" />
    </clipPath>
    <clipPath id="clip-right-triangle" clipPathUnits="userSpaceOnUse">
      <polygon points="315,197.431 267,280.569 363,280.569" />
    </clipPath>
  </defs>

  <rect width="560" height="360" fill="#101820" />
  <rect x="72" y="42" width="416" height="276" rx="16" fill="#1b2227" stroke="#8a7046" stroke-width="6" />
  <rect x="86" y="56" width="388" height="248" rx="10" fill="#263036" stroke="#322a21" stroke-width="2" />

  <g id="standard-piece-instances" fill="#b7bab8" fill-opacity="0.45" stroke="#e2d8bd" stroke-opacity="0.8" stroke-width="4" stroke-linejoin="round">
    <use href="#std-circle" transform="translate(203 237)" />
    <use href="#std-triangle" transform="translate(245 171)" />
    <use href="#std-hexagon" transform="translate(294 190)" />
    <use href="#std-circle" transform="translate(354 175)" />
    <use href="#std-triangle" transform="translate(315 239)" />
    <use href="#std-hexagon" transform="translate(265 274)" />
  </g>

  <g id="boolean-overlap-colors" fill-opacity="1" stroke="#f2ead7" stroke-opacity="0.68" stroke-width="2" stroke-linejoin="round">
    <polygon points="245,129.431 197,212.569 293,212.569" fill="#8b62b5" clip-path="url(#clip-left-circle)" />
    <polygon points="217,274 241,232.431 289,232.431 313,274 289,315.569 241,315.569" fill="#5a9a67" clip-path="url(#clip-left-circle)" />
    <polygon points="246,190 270,148.431 318,148.431 342,190 318,231.569 270,231.569" fill="#bf7c34" clip-path="url(#clip-first-triangle)" />
    <circle cx="354" cy="175" r="48" fill="#8b62b5" clip-path="url(#clip-center-hexagon)" />
    <polygon points="315,197.431 267,280.569 363,280.569" fill="#5a9a67" clip-path="url(#clip-center-hexagon)" />
    <polygon points="217,274 241,232.431 289,232.431 313,274 289,315.569 241,315.569" fill="#bf7c34" clip-path="url(#clip-right-triangle)" />
  </g>

  <g id="piece-outline-restatement" fill="none" stroke="#1a1510" stroke-opacity="0.9" stroke-width="1.5" stroke-linejoin="round">
    <use href="#std-circle" transform="translate(203 237)" />
    <use href="#std-triangle" transform="translate(245 171)" />
    <use href="#std-hexagon" transform="translate(294 190)" />
    <use href="#std-circle" transform="translate(354 175)" />
    <use href="#std-triangle" transform="translate(315 239)" />
    <use href="#std-hexagon" transform="translate(265 274)" />
  </g>
</svg>
