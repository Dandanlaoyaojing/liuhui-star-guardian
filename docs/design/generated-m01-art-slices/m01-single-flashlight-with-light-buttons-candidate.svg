<svg xmlns="http://www.w3.org/2000/svg" width="300" height="500" viewBox="0 0 300 500">
  <defs>
    <linearGradient id="flashlight-body-wash" x1="88" y1="104" x2="208" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eadbb9" stop-opacity="0.98" />
      <stop offset="0.42" stop-color="#bcb489" stop-opacity="0.96" />
      <stop offset="1" stop-color="#7f7962" stop-opacity="0.98" />
